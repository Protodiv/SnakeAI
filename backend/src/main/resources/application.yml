spring:
  application:
    name: snakeai-backend
  datasource:
    url: jdbc:h2:file:${DATABASE_PATH:./db/snakeai};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

model:
  storage:
    path: ${MODEL_STORAGE_PATH:models}
